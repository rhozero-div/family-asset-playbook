name: Keep Hugging Face Space Alive

on:
  schedule:
    # Run every day at 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Hugging Face Space
        run: |
          echo "Pinging Hugging Face Space to reduce cold starts..."
          curl -f -s https://rhozero-div-family-asset-playbook.hf.space/ > /dev/null || echo "Ping failed; will retry on next run"
