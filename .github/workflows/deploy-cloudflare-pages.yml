name: Deploy Cloudflare Pages Frontend

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-cloudflare-pages.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build static frontend
        env:
          NEXT_PUBLIC_FAPM_HF_URL: https://rhozero-div-family-asset-playbook.hf.space/
        run: npm run build

      - name: Validate Cloudflare configuration
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PROJECT_NAME: ${{ secrets.CLOUDFLARE_PROJECT_NAME }}
        run: |
          missing=""
          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            missing="${missing} CLOUDFLARE_API_TOKEN"
          fi
          if [ -z "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            missing="${missing} CLOUDFLARE_ACCOUNT_ID"
          fi
          if [ -n "${missing}" ]; then
            echo "::error title=Missing Cloudflare Secrets::Missing required GitHub secrets:${missing}"
            exit 1
          fi
          if [ -z "${CLOUDFLARE_PROJECT_NAME}" ]; then
            echo "CLOUDFLARE_PROJECT_NAME is not set; defaulting to family-asset-playbook"
          fi

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PROJECT_NAME: ${{ secrets.CLOUDFLARE_PROJECT_NAME }}
        run: |
          PROJECT_NAME="${CLOUDFLARE_PROJECT_NAME:-family-asset-playbook}"
          echo "Deploying static frontend to Cloudflare Pages project: ${PROJECT_NAME}"
          npx wrangler@3 pages deploy out --project-name "${PROJECT_NAME}"
