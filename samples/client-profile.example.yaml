# === 2. Income and Expectations ===
income:
  sources:
    - type: "salary"
      owner: "王先生"
      annual_amount: 800000
      stability: "stable"          # stable / variable / declining
    - type: "salary"
      owner: "王太太"
      annual_amount: 400000
      stability: "stable"
  expectations:
    horizon_years: 10
    annual_growth_rate: 0.04       # 4% annualized
    confidence: "medium"           # low / medium / high
  monthly_living_expense: 25000    # monthly household spending excluding mortgage
  retirement:
    monthly_pension: 5000          # public pension
    monthly_annuity: 3000          # commercial annuity
    monthly_expense: 15000         # monthly spending after retirement

# === 3. Support and Expectations ===
support:
  inheritance_expected:
    - from: "王父"
      timing: "uncertain"          # near / medium / far / uncertain
      estimated_range: [500000, 1500000]
  one_time_income:
    - description: "王先生预期股票期权变现"
      timing_year: 2028
      estimated_range: [1000000, 2000000]
  one_time_expense:
    - description: "王小朵本科留学(美国)"
      timing_year: 2035
      estimated_range: [1500000, 2500000]

# === 4. Major Family Planning Events ===
events:
  - id: "buy_improvement_house"
    type: "housing"
    description: "改善型购房"
    timing_year: 2029
    estimated_amount: 3000000
    certainty: "high"               # high / medium / low
  - id: "daughter_high_school"
    type: "education"
    description: "王小朵国际高中"
    timing_year: 2032
    estimated_amount: 800000
    certainty: "high"
  - id: "daughter_college_abroad"
    type: "education"
    description: "王小朵本科留学"
    timing_year: 2035
    estimated_amount: 2000000
    certainty: "medium"
  - id: "daughter_marriage_house"
    type: "housing"
    description: "王小朵成家买房首付帮衬"
    timing_year: 2040
    estimated_amount: 1500000
    certainty: "low"
  - id: "daughter_other"
    type: "other"
    description: "王小朵其他大额支持(婚礼等)"
    timing_year: 2040
    estimated_amount: 300000
    certainty: "low"
  - id: "mr_wang_retirement"
    type: "retirement"
    description: "王先生退休"
    timing_year: 2048
    owner: "王先生"
    expected_replacement_ratio: 0.6
    certainty: "medium"

# === 5. Client Goals (optional; inferred from risk_tolerance if omitted) ===
objectives:
  target_annual_return: 0.06       # target annualized return 6%
  investment_horizon: 15           # 15-year investment horizon
  max_drawdown_tolerance: 0.20     # maximum drawdown tolerance 20%

# === 6. Current Assets ===
assets:
  real_estate:
    primary_residence:
      estimated_value: 8000000
      outstanding_mortgage: 1500000
  financial:
    fixed_income:
      total_value: 800000
      breakdown_hint: "银行理财 + 货币基金"
    equity:
      total_value: 600000
      breakdown_hint: "偏股公募 + 个股"
    alternatives:
      total_value: 100000
      breakdown_hint: "黄金 ETF"
    insurance:
      term_life_coverage: 0                # term life coverage
      term_life_premium: 0                 # annual premium for term life
      critical_illness_coverage: 500000    # critical illness coverage
      critical_illness_premium: 0          # annual premium for critical illness coverage (already paid up)
      medical_covered: false               # whether medical insurance is in place
      medical_premium: 0
      savings_value: 200000                # cash value of savings-style insurance
      savings_premium: 0                   # annual premium for savings insurance (already paid up)
      breakdown_hint: "重疾险(已缴清) + 终身寿(已缴清)"
  overseas_module_enabled: false     # see handbook/01-input-schema.md for enablement context
  liquidity_reserve_months: 6        # current liquidity runway in months
  liabilities:
    - type: "mortgage"
      outstanding: 1500000
      monthly_payment: 18000
      remaining_years: 12

# === Advisor Assessment (optional, completed manually) ===
advisor_assessment:
  risk_tolerance: "balanced"        # conservative / balanced / aggressive
  knowledge_level: "medium"         # low / medium / high
  notes: "王先生偏保守,但能接受教育金部分进取"
